version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: solver
      POSTGRES_PASSWORD: solver
      POSTGRES_DB: solver
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    command: hypercorn --bind 0.0.0.0:8080 apps.api.app:app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build: .
    command: python -m apps.worker.main
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - api
    restart: unless-stopped

  admin:
    build: .
    command: hypercorn --bind 0.0.0.0:8090 apps.admin.app:app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "8090:8090"
    restart: unless-stopped

volumes:
  pgdata:

